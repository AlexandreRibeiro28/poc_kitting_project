<script src="https://unpkg.com/html5-qrcode"></script>

<div id="reader" style="width: 300px"></div>
<p id="status">Escaneando...</p>

<script>
  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

  scanner.render((decodedText) => {
    document.getElementById('status').innerText = "Código enviado: " + decodedText;
    
    // Sending to ESP32 via HTTP POST
    fetch('http://172.100.10.165/data', { // Your ESP32 IP
      method: 'POST',
      mode: 'cors',
      headers: {
            'Content-Type': 'text/plain'
      },
      body: decodedText
    })
    .then(response => console.log("Sent!"))
    .catch(err => alert("Connection Failed: " + err));
  });
</script>
