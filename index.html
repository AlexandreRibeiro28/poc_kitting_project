<script src="https://unpkg.com/html5-qrcode"></script>

<div id="reader" style="width: 300px"></div>
<p id="status">Scanning...</p>

<script>
  const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });

  scanner.render((decodedText) => {
    document.getElementById('status').innerText = "Sending: " + decodedText;
    
    fetch('http://192.168.x.x/data', { // Use your ESP32's actual IP here
        method: 'POST',
        mode: 'cors', // Explicitly tell the browser to use CORS
        headers: {
            'Content-Type': 'text/plain'
        },
        body: decodedText // This is the string from the Data Matrix
    })
    .then(response => {
        if(response.ok) console.log("Success!");
    })
    .catch(err => {
        console.error("Fetch Error:", err);
        document.getElementById('status').innerText = "Network Error: Check IP or CORS";
    });
</script>
